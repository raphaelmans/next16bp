## 1. Overview

KudosCourts is a player-first, location-based sports venue discovery and reservation platform.

The MVP focuses on:
- Helping players discover **places** (venues) nearby.
- Letting players reserve **specific courts** (court units) at those places via a unified booking flow.
- Monetizing via a simple on-page banner ad.

The platform supports:

- **Manually curated places** — View-only listings with external contact information
- **Reservable places** — Full booking capability with P2P-style payment confirmation
- **Place claiming** — Admin-approved process for organizations to claim curated place listings

KudosCourts does not process payments or facilitate direct communication between players and venue owners.

### 1.1 Terminology (v1.2)

This version introduces explicit naming to avoid ambiguity:

- **Place**: a physical venue/location (address, map pin, photos, amenities).
- **Court**: an individual bookable unit inside a place (e.g., “Court 3”).
- **Sport**: the sport a court supports (v1.2 constraint: **1 court = 1 sport**).
- **Time Slot / Slot**: a bookable time period for a specific court.

---

## 2. Problem Statement

Players lack a single, reliable way to discover nearby venues and reserve time on specific courts. Meanwhile, many venue owners/operators do not have an online reservation system, resulting in fragmented booking processes across social media pages, messaging apps, spreadsheets, and calls.

**KudosCourts solves this by providing:**

- One discovery layer for players
- One standardized reservation engine for participating venues
- A neutral platform that avoids payment and communication liability
- A pathway for curated places to become fully bookable

---

## 3. Goals (MVP)

### 3.1 Primary Goals

| Goal | Description |
|------|-------------|
| Discovery | Enable players to discover places and courts by location |
| Reservation | Enable players to reserve courts using a unified booking flow |
| P2P Payment | Support payment confirmation without handling money |
| Near-real-time Availability | Provide current slot availability (polling acceptable for MVP) |
| Revenue | Generate early revenue via banner ad placement |
| Place Claiming | Allow organizations to claim and manage curated place listings |

### 3.2 Explicit Product Constraints

- Player experience is the primary focus (players-first approach)
- Inventory may be bootstrapped by manual curation before owner onboarding exists
- No payment processing — all payments happen externally (GCash, bank transfer, cash)
- No in-app messaging between players and owners
- Place claiming requires admin approval

## 4. Users & Personas

### 4.1 Player (Primary User)

**Needs:**
- Find places near them
- See hours, amenities, and photos
- Choose a specific court (or “any available court”)
- Reserve a slot when available
- For paid bookings: confirm payment without in-app payment processing

**Common Behaviors:**
- Mobile-first usage
- Short time-to-action (wants to book quickly)
- May not want to create a full profile initially

### 4.2 Organization Owner

**Needs:**
- List multiple places and courts across different sports
- Publish and manage availability per court
- Configure hours per court (day-specific, including overnight)
- Configure hourly pricing per court (time-of-day bands)
- Confirm payments for reservations (P2P confirmation)
- Claim existing curated place listings

**MVP Simplification:**
- Owner-only access (no staff roles)
- Single owner per organization

### 4.3 Platform Admin (Internal)

**Needs:**
- Review and approve place claiming requests
- Manage curated place inventory
- Handle removal requests

## 5. Place Types & Behavior

### 5.1 Place Type Overview

In v1.2, “Curated vs Reservable” applies to the **place listing**.

| Attribute | Curated Place | Reservable Place |
|-----------|---------------|------------------|
| Purpose | Bootstrap inventory | Full booking capability |
| Organization | Optional (can be unclaimed) | Required |
| Booking | View-only, external contact | In-app reservation |
| Payment | N/A | Free or Paid (P2P) |
| Availability | Not shown | Slot-based display (per court) |
| Sports | May include metadata | Each place can have multiple courts, each court has 1 sport |

### 5.2 Curated Places (Default at Launch)

**Purpose:** Bootstrap inventory quickly without requiring owner participation.

**Behavior:**
- Discoverable via location search + map
- Place detail page includes:
  - Name and address
  - Photos (if available)
  - Amenities (if available)
  - Contact socials (Facebook, Viber, Instagram, website)
- View-only: no booking inside KudosCourts
- Clearly labeled as “Contact to Book” or equivalent

**Claim Status:**
- `UNCLAIMED` — Default state, available for claiming
- `CLAIM_PENDING` — Claim request submitted, awaiting admin approval
- `CLAIMED` — Owned by an organization (transitions to Reservable)
- `REMOVAL_REQUESTED` — Owner requested removal from listing

**Metric Behavior:**
- Excluded from reservation funnel metrics (e.g., completion rate)

### 5.3 Reservable Places (Managed/Participating)

**Purpose:** Places that use the KudosCourts reservation engine.

**Behavior:**
- Discoverable via location search + map
- Place detail includes:
  - A list of courts (court units) at the place (e.g., Court 1, Court 2)
  - Court sport (basketball/pickleball/etc)
  - Availability calendar UI
  - Booking UI
- Supports two booking pricing models:
  - **Free** — No payment required
  - **Paid** — Requires P2P payment confirmation flow

**Key v1.2 requirement:**
- Players can choose:
  - A **specific court** at the place (e.g., Court #7), OR
  - **Any available court** at that place (system auto-assigns an available court for the chosen time)

**Requirements:**
- Must be owned by an organization
- Must have at least one reservable court with at least one time slot configured

## 6. Place Claiming Flow

### 6.1 Overview

Organizations can request to claim ownership of curated places. This transitions the place from view-only to fully reservable.

### 6.2 Claiming Process

```
┌─────────────┐    ┌──────────────┐    ┌─────────────┐    ┌──────────────┐    ┌───────────┐
│ Org owner   │───►│ Find curated │───►│ Submit      │───►│ Admin        │───►│ Place now │
│ logs in     │    │ place        │    │ claim       │    │ approves     │    │ reservable│
└─────────────┘    └──────────────┘    └─────────────┘    └──────────────┘    └───────────┘
```

**Step 1: Submit Claim Request**
- Organization owner identifies an unclaimed curated place
- Submits claim request with optional justification notes
- Place claim status → `CLAIM_PENDING`
- Claim request created with status `PENDING`

**Step 2: Admin Review**
- Admin reviews claim request in admin dashboard
- Can view requester’s organization details
- Approves or rejects with optional notes

**Step 3a: Approval**
- Claim request status → `APPROVED`
- Place claim status → `CLAIMED`
- Place listing becomes `RESERVABLE`
- Place assigned to requesting organization
- Organization can now:
  - Add/manage courts at this place (each court has 1 sport)
  - Manage hours and pricing
  - Manage availability and receive bookings

**Step 3b: Rejection**
- Claim request status → `REJECTED`
- Place claim status → `UNCLAIMED`
- Requester notified (future: email notification)

### 6.3 Removal Request Flow

Claimed place owners may request to remove their listing:

1. Owner submits removal request
2. Place claim status → `REMOVAL_REQUESTED`
3. Admin reviews and processes removal
4. Place either deactivated or returned to curated status

### 6.4 Audit Trail

All claim request status transitions are logged with:
- Previous status
- New status
- User who triggered the change
- Timestamp
- Optional notes

## 7. Core User Journeys

### Journey 1: Discover a Place (Curated / View-Only)

| Step | Action | System Response |
|------|--------|-----------------|
| 1 | Player opens app/site | Display search interface |
| 2 | Searches by location | Query places, display on map + list |
| 3 | Selects a curated place | Show place detail page |
| 4 | Views contact information | Display social links (Facebook, Viber, etc.) |
| 5 | Leaves platform to contact | External redirect |

### Journey 2: Discover and Reserve a Free Court (Owner Acceptance Required)

> Reservation contract source of truth: `docs/reservation-state-machine.md` and levels 0–3.

| Step | Action | System Response |
|------|--------|-----------------|
| 1 | Player searches by location | Display reservable places |
| 2 | Selects a place | Show place detail + list of courts |
| 3 | Chooses a court (or “Any available”) | Show availability and booking UI |
| 4 | Picks date + start time (60-min grid) | Validate slot availability |
| 5 | Requests booking | Create reservation `CREATED`, slot `HELD`, 15-min owner acceptance timer |
| 6 | Owner accepts within 15 minutes | Reservation → `CONFIRMED`, slot → `BOOKED` |
| 7 | Player views confirmation | Display reservation details |

**Transaction:** Slot status changes `AVAILABLE` → `HELD` immediately on request; confirmation changes `HELD` → `BOOKED`.

### Journey 3: Discover and Reserve a Paid Court (P2P) — Mutual Confirmation

| Step | Action | System Response |
|------|--------|-----------------|
| 1 | Player searches by location | Display reservable places |
| 2 | Selects a place | Show place detail + list of courts |
| 3 | Chooses a court (or “Any available”) | Show availability and booking UI |
| 4 | Picks date + start time (60-min grid) | Validate slot availability |
| 5 | Requests booking | Reservation `CREATED`, slot `HELD`, 15-min owner acceptance timer |
| 6 | Owner accepts within 15 minutes | Reservation → `AWAITING_PAYMENT`, payment timer resets to fresh 15 minutes |
| 7 | Player views payment instructions | Display GCash/bank details |
| 8 | Player pays externally | (Outside platform) |
| 9 | Accepts T&C, clicks “I Have Paid” | Status → `PAYMENT_MARKED_BY_USER` (does not extend TTL) |
| 10 | (Optional) Uploads proof | Store payment proof |
| 11 | Owner confirms payment | Status → `CONFIRMED`, slot → `BOOKED` |
| 12 | Player views confirmation | Display reservation details |

### Journey 4: Owner Confirms Payment

| Step | Action | System Response |
|------|--------|-----------------|
| 1 | Owner opens dashboard | Display pending reservations |
| 2 | Views reservation details | Show player info, slot, payment proof |
| 3 | Confirms payment | Reservation → `CONFIRMED`, Slot → `BOOKED` |
| 4 | (Automatic) Player notified | (Future: push/email notification) |

### Journey 5: Owner Manages Availability (Per Court Unit)

| Step | Action | System Response |
|------|--------|-----------------|
| 1 | Owner opens dashboard | Display place + courts |
| 2 | Selects a court | Show availability calendar |
| 3 | Configures court hours (day-specific) | Store weekly hours windows |
| 4 | Configures hourly pricing rules | Store price windows (per day + time) |
| 5 | Creates time slots | Validate no overlap, save slots |
| 6 | (Optional) Overrides price per slot | Store slot-level override |
| 7 | Slots become available | Players can now book |

## 8. Reservation System

### 8.0 Contract Reference

The reservation state machine is documented and versioned here:
- `docs/reservation-state-machine.md`
- `docs/reservation-state-machine-level-0-summary.md`
- `docs/reservation-state-machine-level-1-product.md`
- `docs/reservation-state-machine-level-2-engineering.md`
- `docs/reservation-state-machine-level-3-ops.md`

In v1.2, the PRD must match that contract.

### 8.1 Reservation Statuses

| Status | Description | Slot State |
|--------|-------------|------------|
| `CREATED` | Booking request created by player; awaiting owner acceptance | HELD |
| `AWAITING_PAYMENT` | Owner accepted a paid request; waiting for player payment | HELD |
| `PAYMENT_MARKED_BY_USER` | Player marked payment as complete; awaiting owner confirmation | HELD |
| `CONFIRMED` | Reservation complete | BOOKED |
| `EXPIRED` | Timer expired | AVAILABLE (released) |
| `CANCELLED` | Reservation cancelled/rejected | AVAILABLE (released) |

### 8.2 Reservation Lifecycle — Free Courts (Mutual confirmation)

```
┌─────────┐    ┌───────────┐
│ CREATED │───►│ CONFIRMED │
└─────────┘    └───────────┘
     │
     │
     ├─────────────►┌───────────┐
     │              │ CANCELLED │
     │              └───────────┘
     │
     └─────────────►┌─────────┐
                    │ EXPIRED │
                    └─────────┘
```

- Slot is held immediately when player requests (CREATED)
- Owner acceptance required within 15 minutes

### 8.3 Reservation Lifecycle — Paid Courts (Mutual confirmation before payment)

```
┌─────────┐    ┌──────────────────┐    ┌───────────────────────┐    ┌───────────┐
│ CREATED │───►│ AWAITING_PAYMENT │───►│ PAYMENT_MARKED_BY_USER│───►│ CONFIRMED │
└─────────┘    └──────────────────┘    └───────────────────────┘    └───────────┘
     │                  │                        │
     │                  │                        │
     │                  └─────────────►┌─────────┐
     │                                  │ EXPIRED │
     │                                  └─────────┘
     ├─────────────►┌───────────┐
     │              │ CANCELLED │
     │              └───────────┘
     └─────────────►┌─────────┐
                    │ EXPIRED │
                    └─────────┘
```

### 8.4 TTL (Time-to-Live) Rules

| Rule | Value |
|------|-------|
| Owner acceptance window | 15 minutes on `CREATED` |
| Payment window | Fresh 15 minutes when owner accepts a paid request (`AWAITING_PAYMENT`) |
| After player marks paid | Does not extend TTL (`PAYMENT_MARKED_BY_USER` keeps same expiresAt) |
| Expiration behavior | Slot released, reservation marked `EXPIRED` |
| Same-day booking | Permitted |

### 8.5 Player Information Snapshot

When a reservation is created, the system captures:
- Player display name
- Player email
- Player phone number

This ensures historical accuracy if the player updates their profile after booking.

## 9. Time Slot Management

### 9.1 Design Approach

**Explicit Slot Creation** — Every bookable slot is a database record.

**Rationale:**
- Simple availability queries
- Transactional integrity for bookings
- Easy to block individual slots
- Clear audit trail

**UI handles bulk creation** — The frontend provides calendar-style interfaces for creating multiple slots; the backend receives explicit slot records.

### 9.2 Time Slot Attributes (v1.2)

| Attribute | Description |
|-----------|-------------|
| Place | The venue/location the court belongs to |
| Court | The specific court unit the slot belongs to |
| Sport | The sport of the court unit |
| Start time | Slot start (timestamp with timezone) |
| End time | Slot end (timestamp with timezone) |
| Duration | **60-minute base granularity**; longer durations are multiples of 60 |
| Status | AVAILABLE, HELD, BOOKED, BLOCKED |
| Price | Amount in smallest currency unit (cents) |
| Currency | ISO 4217 code (PHP, USD, etc.) |

### 9.3 Slot Granularity (New Requirement)

- Minimum start-time increment: **60 minutes**
- Default booking duration: **60 minutes**
- Allowed durations: **multiples of 60** (e.g., 60/120/180), subject to availability

> Note: The technical implementation may represent longer bookings as either:
> - a single longer slot record, or
> - multiple consecutive 60-minute slots reserved together.
> The product requirement is that the player can select longer durations in 60-minute increments.

### 9.4 Time Slot Statuses

| Status | Description | Who Can Transition |
|--------|-------------|-------------------|
| `AVAILABLE` | Open for booking | System (on release) |
| `HELD` | Held during request/payment windows | System (on reservation start) |
| `BOOKED` | Confirmed reservation | System (on confirmation) |
| `BLOCKED` | Manually blocked by owner | Owner |

### 9.5 Status Transitions

```
AVAILABLE ──┬──► HELD ──┬──► BOOKED
            │           │
            │           └──► AVAILABLE (expired)
            │
            └──► BLOCKED ──► AVAILABLE (owner unblocks)
```

### 9.6 Pricing Model (Hourly, Time-of-Day)

**Hourly pricing by rule windows (per court):**

- Price is defined as **hourly rate** and varies by:
  - Day of week
  - Time-of-day window (e.g., morning/afternoon/evening)
- Because the slot granularity is 60 minutes, a 60-minute slot price is typically:
  - `slotPriceCents = hourlyRateCents`
- Longer durations (120/180/etc) must compute total price consistently:
  - `totalPriceCents = hourlyRateCents * hours` (or rule-based sum if multiple windows apply)

**Slot-level overrides remain supported:**
- A specific slot can override the computed/default price (promos, special events).

**Examples:**
- Morning: ₱200/hour
- Evening: ₱350/hour
- Weekend: ₱400/hour

### 9.7 Overlap Prevention

Handled at the repository layer:
- Before creating a slot, check for overlapping time ranges
- Reject creation if overlap detected
- Provide clear error messaging to owner

## 14. Non-Functional Requirements

### 14.1 Multi-tenancy & Data Safety

| Requirement | Description |
|-------------|-------------|
| Tenant isolation | Organization data is isolated; owners only see their places/courts |
| Double-booking prevention | System prevents booking same slot twice |
| Row-level security | Database enforces access control |

### 14.2 Reliability

| Requirement | Description |
|-------------|-------------|
| Transaction consistency | Reservation state transitions are atomic |
| Slot integrity | Slot status always matches reservation status |
| TTL enforcement | Background job expires stale reservations |

### 14.3 Performance (MVP Scale)

| Metric | Target |
|--------|--------|
| Organizations | ~100 in early scale |
| Concurrent users | Moderate (polling acceptable) |
| Response time | < 2s for search and booking |

### 14.4 Data Retention

| Data Type | Retention |
|-----------|-----------|
| Active reservations | Indefinite |
| Past reservations | 1 year minimum |
| Time slots | Archive after 90 days |
| Audit logs | 1 year minimum |

## 15. Audit & Compliance

### 15.1 Reservation Audit Trail

All reservation status transitions are logged:

| Field | Description |
|-------|-------------|
| Reservation ID | Which reservation |
| From status | Previous status (null for creation) |
| To status | New status |
| Triggered by | User ID or SYSTEM |
| Role | PLAYER, OWNER, or SYSTEM |
| Timestamp | When the transition occurred |
| Notes | Optional context |

### 15.2 Claim Request Audit Trail

All claim request status transitions are logged:

| Field | Description |
|-------|-------------|
| Claim request ID | Which request |
| From status | Previous status |
| To status | New status |
| Triggered by | Admin user ID |
| Timestamp | When the transition occurred |
| Notes | Review notes |

### 15.3 Purpose

- Dispute resolution between players and owners
- Accountability for admin actions
- Debugging and support
- Future analytics on conversion funnel

## 16. Success Metrics

### 16.1 Primary Metric

**Reservation Completion Rate**
- Definition: Confirmed reservations / Reservation attempts
- Excludes: Curated place views (no booking capability)

### 16.2 Supporting Metrics

| Metric | Description |
|--------|-------------|
| Search-to-detail conversion | Users who view a place after searching |
| Detail-to-reservation start | Users who initiate booking after viewing |
| Time-to-confirm (P2P) | Average time from booking request to owner confirmation |
| TTL expiration rate | Percentage of bookings that expire |
| Active places listed | Total places (curated + reservable) |
| Claim conversion rate | Approved claims / Total claim requests |

## 17. Legal & Liability Requirements

### 17.1 Platform Neutrality

KudosCourts must remain neutral and avoid payment liability.

### 17.2 Required Disclosures

Terms & Conditions must clearly state:
- KudosCourts does not process or verify payments
- Payment disputes are between player and venue owner
- KudosCourts is not liable for booking disputes

### 17.3 User Acknowledgement

Before marking payment as complete, players must:
- Accept Terms & Conditions via explicit checkbox
- Acknowledge the payment disclaimer

### 17.4 Audit Trail

- All payment confirmations are logged
- Player acknowledgement timestamp preserved
- Supports dispute investigation if needed

## Appendix A: Glossary

| Term | Definition |
|------|------------|
| Place | A venue/location listing (address + map pin + media + amenities) |
| Court | An individual bookable unit inside a place (Court #1, Court #7, etc.) |
| Sport | The sport supported by a court (v1.2: 1 court = 1 sport) |
| Curated Place | A place added by KudosCourts team, view-only with external contact info |
| Reservable Place | A place with in-app booking capability, owned by an organization |
| P2P Payment | Peer-to-peer payment outside KudosCourts (GCash, bank, cash) |
| TTL | Time-to-live timers (owner acceptance + payment windows) |
| Soft Lock / Hold | Temporary hold on a slot (`HELD`) while the reservation is active |
| Claim | Process of an organization taking ownership of a curated place |
| Organization | A venue owner/operator entity (tenant in multi-tenant system) |
| Slot | A bookable time period for a specific court |
| Any Available Court | Booking mode where system auto-assigns an available court at the chosen time |
