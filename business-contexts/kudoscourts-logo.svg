<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- KudosCourts App Icon - 512x512 (Square Court Version) -->
  
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F766E"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="4" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.2" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners for app icon -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Court design (square) centered -->
  <g transform="translate(96, 96)">
    <!-- Court outline - white with slight transparency -->
    <rect x="0" y="0" width="320" height="320" rx="24" stroke="white" stroke-width="16" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Net line (center horizontal) -->
    <line x1="0" y1="160" x2="320" y2="160" stroke="white" stroke-width="14"/>
    
    <!-- Kitchen/NVZ lines -->
    <line x1="0" y1="96" x2="320" y2="96" stroke="white" stroke-width="10" opacity="0.85"/>
    <line x1="0" y1="224" x2="320" y2="224" stroke="white" stroke-width="10" opacity="0.85"/>
    
    <!-- Center service line (vertical) -->
    <line x1="160" y1="0" x2="160" y2="320" stroke="white" stroke-width="8" opacity="0.5"/>
    
    <!-- Location discovery pin - the key differentiator -->
    <circle cx="160" cy="160" r="48" fill="url(#orangeGrad)" filter="url(#innerShadow)"/>
    <circle cx="160" cy="160" r="24" fill="white"/>
  </g>
</svg>
