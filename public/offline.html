<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline - KudosCourts</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
					"Helvetica Neue", Arial, sans-serif;
				background-color: #faf9f7;
				color: #1a1a1a;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100dvh;
				padding: 1.5rem;
			}
			.container {
				text-align: center;
				max-width: 28rem;
			}
			.icon {
				width: 4rem;
				height: 4rem;
				margin: 0 auto 1.5rem;
				border-radius: 50%;
				background-color: #ccfbf1;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.icon svg {
				width: 2rem;
				height: 2rem;
				color: #0d9488;
			}
			h1 {
				font-size: 1.5rem;
				font-weight: 700;
				margin-bottom: 0.5rem;
			}
			p {
				color: #6b7280;
				line-height: 1.6;
				margin-bottom: 1.5rem;
			}
			button {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				padding: 0.625rem 1.5rem;
				background-color: #0d9488;
				color: #fff;
				border: none;
				border-radius: 0.5rem;
				font-size: 0.9375rem;
				font-weight: 500;
				cursor: pointer;
				transition: background-color 0.15s;
			}
			button:hover {
				background-color: #0f766e;
			}
			button:active {
				background-color: #115e59;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="icon">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008Z"
					/>
				</svg>
			</div>
			<h1>You're offline</h1>
			<p>
				It looks like you've lost your internet connection. Check your
				connection and try again.
			</p>
			<button onclick="window.location.reload()">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					width="16"
					height="16"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="2"
					stroke="currentColor"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.992 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"
					/>
				</svg>
				Retry
			</button>
		</div>
	</body>
</html>
